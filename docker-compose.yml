services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appointments
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
  test-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appointments_test
    ports:
      - "5433:5432"
volumes:
  db-data:
